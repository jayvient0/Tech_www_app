<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechCrush</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 680px;
      padding: 36px;
      border: 1px solid rgba(226, 232, 240, 0.2);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.88);
      box-shadow: 0 18px 60px rgba(15, 23, 42, 0.45);
    }

    h1 {
      margin-bottom: 16px;
      font-size: 3rem;
      letter-spacing: -0.03em;
    }

    p {
      line-height: 1.7;
      margin-bottom: 24px;
      color: #cbd5e1;
    }

    a.button {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 999px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    a.button:hover {
      transform: translateY(-2px);
      background: #0ea5e9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome by TechCrush</h1>
    <p>Discover the latest in technology, reviews, tutorials, and innovation. TechCrush brings fresh ideas and practical insights for tech enthusiasts and creators.</p>
    <a class="button" href="#">Explore TechCrush</a>
  </div>
</body>
</html>
